display_information:
  name: Slack to Coding Agent
  description: Forward mentions and assistant/DM messages to a local coding-agent backend.
  background_color: "#2c2d30"
features:
  bot_user:
    display_name: coding-agent
    always_online: true
  assistant_view:
    assistant_label: Coding Agent
    assistant_description: Sends your Slack prompts to your local coding agent.
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - chat:write
      - im:history
      - im:read
      - im:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - assistant_thread_started
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
