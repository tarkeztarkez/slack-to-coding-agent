display_information:
  name: Slack to Coding Agent
  description: Forward mentions and assistant/DM messages to a local coding-agent backend.
  background_color: "#2c2d30"
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: coding-agent
    always_online: true
  assistant_view:
    assistant_description: Sends your Slack prompts to your local coding agent.
    suggested_prompts:
      - title: Ask the coding agent
        message: Help me with the current coding task.
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - chat:write
      - im:history
      - im:read
      - im:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - assistant_thread_started
      - assistant_thread_context_changed
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
